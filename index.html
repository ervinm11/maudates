<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Matcha Timeline</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* 🌈 background */
body {
  min-height: 100vh;
  overflow-x: hidden;

  background: linear-gradient(
    120deg,
    #c8e6c9,
    #b3e5fc,
    #f8bbd0
  );

  background-size: 400% 400%;
  animation: gradientFlow 12s ease infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px;
  text-align: center;
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.35);
  z-index: 10;
}

header h1 {
  font-size: 18px;
  color: #2e7d32;
}

button.add {
  margin-top: 6px;
  padding: 8px 14px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #66bb6a, #42a5f5, #ec407a);
  color: white;
  cursor: pointer;
  font-size: 12px;
}

/* TIMELINE */
.timeline {
  margin-top: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 120px;
}

/* CARD */
.card {
  width: 88%;
  max-width: 520px;
  margin: 14px 0;
  padding: 18px;
  border-radius: 22px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);

  position: relative;
  transition: 0.3s ease;
}

.card.locked {
  opacity: 0.85;
}

.card:hover {
  transform: translateY(-3px);
}

/* border glow */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 22px;
  padding: 1px;

  background: linear-gradient(135deg, #a5d6a7, #81d4fa, #f48fb1);

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);

  -webkit-mask-composite: xor;
  pointer-events: none;
}

/* LABEL */
.label {
  font-size: 12px;
  color: #2e7d32;
  opacity: 0.85;
}

.sip {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
}

/* TEXT */
textarea {
  width: 100%;
  margin-top: 10px;
  border: none;
  outline: none;
  background: transparent;
  resize: none;
  font-size: 14px;
  color: #1b1b1b;
  min-height: 60px;
}

/* ACTIONS */
.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  align-items: center;
}

.left-actions {
  display: flex;
  gap: 6px;
}

.btn {
  border: none;
  padding: 6px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
}

/* delete */
.delete {
  background: #ef9a9a;
}

/* lock */
.lock {
  background: #ffd54f;
}

.locked-badge {
  font-size: 11px;
  color: #6d4c41;
}

/* fade */
.fade-out {
  opacity: 0;
  transform: scale(0.9);
}
</style>
</head>

<body>

<header>
  <h1>🧋 Matcha Timeline</h1>
  <button class="add" onclick="addCard()">+ New Drink</button>
</header>

<div class="timeline" id="timeline"></div>

<script>
let entries = [];

const sipLabels = [
  "a sip of thought",
  "first sip of curiosity",
  "warm sip of memory",
  "quiet sip of reflection",
  "soft sip of missing something",
  "gentle sip of realization",
  "late-night sip of overthinking",
  "calm sip of acceptance"
];

/* LOAD */
window.onload = () => {
  entries = JSON.parse(localStorage.getItem("matcha")) || [];
  render();
};

/* ADD */
function addCard() {
  entries.push({
    id: Date.now(),
    text: "",
    locked: false
  });

  save();
  render();
}

/* RENDER */
function render() {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  entries.forEach((e, i) => {
    const card = document.createElement("div");
    card.className = "card" + (e.locked ? " locked" : "");

    card.innerHTML = `
      <div class="label">
        ${getDateLabel(i)} • 
        <span class="sip">${getSipLabel(i)}</span>
        ${e.locked ? " 🔒 <span class='locked-badge'>locked</span>" : ""}
      </div>

      <textarea 
        ${e.locked ? "disabled" : ""}
        oninput="updateText(${e.id}, this.value)"
      >${e.text}</textarea>

      <div class="actions">
        <div class="left-actions">
          <button class="btn lock" onclick="toggleLock(${e.id})">
            ${e.locked ? "Unlock" : "Lock"}
          </button>
        </div>

        <button class="btn delete" onclick="removeCard(${e.id})">
          Delete
        </button>
      </div>
    `;

    timeline.appendChild(card);
  });
}

/* DATE */
function getDateLabel(i) {
  const n = i + 1;
  if (n === 1) return "1st date";
  if (n === 2) return "2nd date";
  if (n === 3) return "3rd date";
  return `${n}th date`;
}

/* SIP */
function getSipLabel(i) {
  return sipLabels[i % sipLabels.length];
}

/* UPDATE TEXT */
function updateText(id, value) {
  const item = entries.find(e => e.id === id);
  if (item && !item.locked) {
    item.text = value;
    save();
  }
}

/* LOCK / UNLOCK */
function toggleLock(id) {
  const item = entries.find(e => e.id === id);
  if (item) {
    item.locked = !item.locked;
    save();
    render();
  }
}

/* DELETE */
function removeCard(id) {
  const item = entries.find(e => e.id === id);

  if (item && item.locked) {
    alert("This entry is locked 🔒");
    return;
  }

  const card = event.target.closest(".card");
  card.classList.add("fade-out");

  setTimeout(() => {
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }, 250);
}

/* SAVE */
function save() {
  localStorage.setItem("matcha", JSON.stringify(entries));
}
</script>

</body>
</html>
